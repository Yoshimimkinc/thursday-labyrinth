/* =========================================================================

  WALK:        0.085,  // 走る速さ（タイル/フレーム）

  FALL:        0.150,  // 落下速度

  HOLE_LIFE:   520,    // 穴が塞がるまで（約8.5秒）
  HOLE_WARN:   90,     // 塞がる直前の点滅時間
  ENEMY_ESCAPE:260,    // 敵が穴から這い上がるまで（長め＝助かりやすい）
  ENEMY_RESPAWN:180,   // 敵が潰されて復活するまで
  CLIMB_OUT:   22,     // 自分が穴に落ちた時、↑長押しでよじ登るまで
  GRACE:       90,     // ステージ開始／復帰直後の無敵
  LIVES:       5,
  AI_TICK:     6       // 敵AIの経路再計算の間隔
};

var PARTY=['佐藤さん','岩田君','高林君','ミヤカワくん'];

/* ---- ステージ突破ごとの ひとこと（4人ローテ・愛のある自虐） ---- */

  {who:'佐藤さん',    line:'一階 片付いた。…まあ 段取り八分 やけどな'},
  {who:'岩田君',      line:'よし 回収。…報連相 だけは 頼むで'},
  {who:'高林君',      line:'上出来。5Sは 裏切らんな'},
  {who:'ミヤカワくん',line:'ナイス。気合の前に まず 標準化 や'}
];
var hitoIdx=0;
function nextHitokoto(){ var h=HITOKOTO[hitoIdx%HITOKOTO.length]; hitoIdx++; return h; }

/* =========================================================================
   タイル定義
   ========================================================================= */
var EMPTY=0, BRICK=1, SOLID=2, LADDER=3, ROPE=4, EXIT=5, HOLE=6;
function solidT(v){ return v===BRICK||v===SOLID; }
function passable(v){ return !solidT(v); }
function climbT(v){ return v===LADDER || (v===EXIT && exitOpen); }

var T=20, COLS=18, ROWS=15;      // 盤面 18×15（1タイル20px＝360×300）
var FX=0, FY=46;                 // 盤面の左上（上はHUD）

/* =========================================================================
   ステージ（'#'掘れる床 / '='掘れない設備 / 'H'はしご / '-'クレーンのレール
             '$'粗利 / 'X'脱出はしご(粗利を全部拾うと出現) / 'P'自分
             'E'経営あるある / 'D'納期ドラゴン / 'S'スポンジマン)
   ========================================================================= */
var STAGES=[
{ name:'1F 受注の谷', enemies:['kyaku','gaicyu'], map:[
"         X        ",
" $       X   H  $ ",
"#############H####",

"    H    $    H   ",

"###H##############",

" P H    $      $  ",

]},
{ name:'2F 外注さんの回廊', enemies:['kyaku','gaicyu','sagyo'], map:[
"        X         ",
"  $  H  X   $   $ ",
"#####H############",
"     H            ",

"##===####H########",
"         H        ",

"#H#######H#     ##",
" H                ",
" H  ----$  E $  H ",
"#H##    ########H#",
"                H ",
" P   $    $   $ H ",
"=================="
]},
{ name:'3F 納期ドラゴンの間', enemies:['kyaku','sagyo','dragon'], map:[
"             X    ",
" $ H    $    X  $ ",
"###H##############",
"   H              ",

"######====#H######",

"######H#####    ##",

/* 敵（経営あるある）の種類 */
var EKIND={

  gaicyu: {name:'がいちゅうさん',      col:'#b48cff', spd:0.037},

/* 各ステージ開始時の"経営者あるある"愚痴（最後は必ず自省で着地） */
var STAGE_GUCHI=[

  [{who:'岩田君',   line:'外注さん、納期 いつも ギリギリ…。\n…て、図面 遅う 出したん 俺やけどな。'}],
  [{who:'高林君',   line:'若い子ら、休憩ばっか スマホ 見とる…。\n…て、面白い 仕事 渡せてへん 俺の 責任や。'},
   {who:'ミヤカワくん', line:'出たな 納期ドラゴン。\n8月を 食って 7月に 来よった。'}],
  [{who:'ROIC経営モンスター', line:'投資対効果の 薄い 設備投資は\nダメ・ダメ・ダメ! 償却 何年? 稼働率は?\n…その 更新、ROIC 下げるだけだよ?'},
   {who:'ミヤカワくん', line:'…痛い とこ 突きよる。\nけど 数字で 詰めるだけの 経営は\n現場を 干からびさす。'},
   {who:'ミヤカワくん', line:'屋上や。ここで 決める。\n走って 掘って 拾い切る——それが 現場の 答えや。'}]
];

/* =========================================================================
   状態
   ========================================================================= */
var mode='title';   // title/intro/play/clear/twist/win/over
var t=0;
var score=0, lives=TUNE.LIVES;
var stageNo=0;                    // 1..4
var grid=[], gold=[], holes=[];
var goldLeft=0, goldTotal=0;
var exitOpen=false;
var player=null, enemies=[], enemyStarts=[];
var parts=[], floaters=[];
var dist=null, aiTick=0;
var dlg=[], dlgActive=false;
var overMsg='';
var msgLine='';

/* 入力 */
var pad={left:false,right:false,up:false,down:false};
var keyPad={left:false,right:false,up:false,down:false};

/* =========================================================================
   オーディオ（WebAudio合成・素材なし）
   ========================================================================= */
var AUDIO={ctx:null,master:null,muted:false,on:false,noiseBuf:null};
function initAudio(){
  if(AUDIO.ctx){ try{ if(AUDIO.ctx.state==='suspended') AUDIO.ctx.resume(); }catch(e){} return; }
  try{
    var AC=(typeof window!=='undefined')&&(window.AudioContext||window.webkitAudioContext);
    if(!AC) return;
    AUDIO.ctx=new AC();
    AUDIO.master=AUDIO.ctx.createGain();
    AUDIO.master.gain.value=AUDIO.muted?0:0.30;
    AUDIO.master.connect(AUDIO.ctx.destination);
    var len=AUDIO.ctx.sampleRate*0.4;
    var buf=AUDIO.ctx.createBuffer(1,len,AUDIO.ctx.sampleRate);
    var d=buf.getChannelData(0);
    for(var i=0;i<len;i++) d[i]=Math.random()*2-1;
    AUDIO.noiseBuf=buf;
    AUDIO.on=true;
  }catch(e){ AUDIO.ctx=null; AUDIO.on=false; }
}
function toggleMute(){ AUDIO.muted=!AUDIO.muted; if(AUDIO.master){ try{ AUDIO.master.gain.value=AUDIO.muted?0:0.30; }catch(e){} } }
function tone(freq,dur,type,vol,slideTo){
  if(!AUDIO.on||AUDIO.muted||!AUDIO.ctx) return;
  try{
    var c=AUDIO.ctx,tt=c.currentTime;
    var o=c.createOscillator(),g=c.createGain();
    o.type=type||'square';
    o.frequency.setValueAtTime(freq,tt);
    if(slideTo) o.frequency.exponentialRampToValueAtTime(Math.max(1,slideTo),tt+dur);
    g.gain.setValueAtTime(0.0001,tt);
    g.gain.exponentialRampToValueAtTime(vol||0.2,tt+0.006);
    g.gain.exponentialRampToValueAtTime(0.0001,tt+dur);
    o.connect(g); g.connect(AUDIO.master);
    o.start(tt); o.stop(tt+dur+0.02);
  }catch(e){}
}
function noise(dur,vol,filtFreq,slideDown){
  if(!AUDIO.on||AUDIO.muted||!AUDIO.ctx||!AUDIO.noiseBuf) return;
  try{
    var c=AUDIO.ctx,tt=c.currentTime;
    var s=c.createBufferSource(); s.buffer=AUDIO.noiseBuf;
    var f=c.createBiquadFilter(); f.type='lowpass';
    f.frequency.setValueAtTime(filtFreq||1600,tt);
    if(slideDown) f.frequency.exponentialRampToValueAtTime(Math.max(80,filtFreq*0.2),tt+dur);
    var g=c.createGain();
    g.gain.setValueAtTime(vol||0.3,tt);
    g.gain.exponentialRampToValueAtTime(0.0001,tt+dur);
    s.connect(f); f.connect(g); g.connect(AUDIO.master);
    s.start(tt); s.stop(tt+dur+0.02);
  }catch(e){}
}
function sfxGold(){ tone(880,0.07,'square',0.10,1320); tone(1320,0.09,'square',0.07); }
function sfxDig(){ noise(0.16,0.24,900,true); tone(160,0.12,'square',0.10,70); }
function sfxFill(){ tone(120,0.18,'sawtooth',0.10,60); }
function sfxTrap(){ noise(0.20,0.22,1400,true); tone(300,0.14,'square',0.10,90); }
function sfxDie(){ noise(0.32,0.30,900,true); tone(140,0.32,'square',0.14,50); }
function sfxClear(){ tone(523,0.10,'square',0.12); tone(659,0.10,'square',0.12); tone(784,0.20,'square',0.14); }
function sfxStep(){ tone(220,0.03,'square',0.03); }

/* =========================================================================
   ステージ読み込み
   ========================================================================= */
function tileAt(c,r){
  if(c<0||c>=COLS) return SOLID;
  if(r>=ROWS) return SOLID;
  if(r<0) return EMPTY;
  return grid[r][c];
}
function goldIdx(c,r){
  for(var i=0;i<gold.length;i++){ if(gold[i].c===c&&gold[i].r===r&&!gold[i].got) return i; }
  return -1;
}
function loadStage(n){
  stageNo=n;
  var S=STAGES[n-1];
  grid=[]; gold=[]; holes=[]; enemies=[]; enemyStarts=[]; parts=[]; floaters=[];
  exitOpen=false; dist=null; aiTick=0;
  var ei=0, pStart={c:1,r:13};
  for(var r=0;r<ROWS;r++){
    var row=[], src=S.map[r];
    for(var c=0;c<COLS;c++){
      var ch=src.charAt(c), v=EMPTY;
      if(ch==='#') v=BRICK;
      else if(ch==='=') v=SOLID;
      else if(ch==='H') v=LADDER;
      else if(ch==='-') v=ROPE;
      else if(ch==='X') v=EXIT;
      else if(ch==='$'){ v=EMPTY; gold.push({c:c,r:r,got:false}); }
      else if(ch==='P'){ v=EMPTY; pStart={c:c,r:r}; }
      else if(ch==='E'||ch==='D'||ch==='S'){
        v=EMPTY;
        var kind=S.enemies[Math.min(ei,S.enemies.length-1)];
        if(ch==='D') kind='dragon';
        if(ch==='S') kind='gonge';
        enemyStarts.push({c:c,r:r,kind:kind}); ei++;
      }
      row.push(v);
    }
    grid.push(row);
  }
  goldTotal=gold.length; goldLeft=goldTotal;
  player=mkActor(pStart.c,pStart.r,'me');
  player.grace=TUNE.GRACE;
  for(var i=0;i<enemyStarts.length;i++){
    var es=enemyStarts[i];
    enemies.push(mkActor(es.c,es.r,es.kind));
  }
  msgLine=S.name+' — 粗利を ぜんぶ 拾って 上へ';
}
function mkActor(c,r,kind){
  return { c:c, r:r, tc:c, tr:r, p:0, moving:false, mode:'', kind:kind,
           face:1, anim:0, trap:0, dead:0, digLock:0, climbHold:0, grace:0 };
}
function actorX(a){ return (a.c+(a.tc-a.c)*a.p); }
function actorY(a){ return (a.r+(a.tr-a.r)*a.p); }

/* =========================================================================
   移動エンジン（タイル間を1マスずつ・ロードランナー準拠）
   ========================================================================= */
function baseSpd(a){
  if(a.kind==='me') return TUNE.WALK;
  return EKIND[a.kind].spd;
}
function stepSpeed(a){
  if(a.mode==='fall') return TUNE.FALL;
  if(a.tr!==a.r) return (a.kind==='me'?TUNE.CLIMB:baseSpd(a)*0.85);
  return baseSpd(a);
}
function startMove(a,tc,tr,md){ a.tc=tc; a.tr=tr; a.p=0; a.moving=true; a.mode=md||''; }
function supported(a){
  var cur=tileAt(a.c,a.r), below=tileAt(a.c,a.r+1);
  if(cur===HOLE) return true;              // 掘った穴は"床のくぼみ"＝底で止まる
  if(climbT(cur)||cur===ROPE) return true;
  if(solidT(below)||climbT(below)) return true;
  return false;
}
function decide(a,wx,wy){
  if(!supported(a)){ startMove(a,a.c,a.r+1,'fall'); return; }
  if(wy<0 && climbT(tileAt(a.c,a.r)) && climbT(tileAt(a.c,a.r-1))){ startMove(a,a.c,a.r-1,'climb'); return; }
  if(wy>0 && tileAt(a.c,a.r)!==HOLE && passable(tileAt(a.c,a.r+1))){ startMove(a,a.c,a.r+1,'climb'); return; }
  if(wx!==0 && passable(tileAt(a.c+wx,a.r))){ a.face=wx; startMove(a,a.c+wx,a.r,''); return; }
}
function actorUpdate(a,wx,wy){
  if(a.moving){
    a.p+=stepSpeed(a);
    if(a.p<1) return;
    a.c=a.tc; a.r=a.tr; a.p=0; a.moving=false;
    var wasFall=(a.mode==='fall'); a.mode='';
    onArrive(a,wasFall);
    if(a.dead) return;
  }
  decide(a,wx,wy);
}
function onArrive(a,wasFall){
  if(a.kind==='me'){
    var gi=goldIdx(a.c,a.r);
    if(gi>=0){
      gold[gi].got=true; goldLeft--; score+=100; sfxGold();
      floaters.push({txt:'粗利 +100',x:FX+a.c*T+T/2,y:FY+a.r*T,tt:40,col:'#ffd23f',big:false});
      if(goldLeft<=0){ openExit(); }
    }
    if(wasFall) sfxStep();
  }
}
function openExit(){
  exitOpen=true; sfxClear();
  floaters.push({txt:'脱出はしご 出現! 上へ 走れ',x:W/2,y:FY+40,tt:150,col:'#7ad1ff',big:true});
  msgLine='粗利 回収 完了 — 屋上へ 脱出せよ';
}

/* =========================================================================
   穴を掘る（標準化のツルハシ）
   ========================================================================= */
function tryDig(dirX){
  if(mode!=='play'||!player||player.dead) return;
  if(player.moving||player.digLock>0) return;
  if(!solidT(tileAt(player.c,player.r+1))) return;       // 床の上でしか掘れない
  var c=player.c+dirX, r=player.r+1;
  if(c<0||c>=COLS||r>=ROWS) return;
  if(tileAt(c,r)!==BRICK) return;                        // '='の設備は掘れない
  if(!passable(tileAt(c,r-1))) return;                   // 掘る場所の真上が塞がっていたら不可
  if(goldIdx(c,r-1)>=0) return;
  grid[r][c]=HOLE;
  holes.push({c:c,r:r,t:0});
  player.digLock=TUNE.DIG_FREEZE; player.face=dirX;
  sfxDig();
  for(var i=0;i<6;i++) parts.push({x:FX+c*T+T/2,y:FY+r*T+T/2,vx:(Math.random()-0.5)*3,vy:-Math.random()*2,life:18,max:18,col:'#a9714a',sz:2});
}
function updateHoles(){
  for(var i=holes.length-1;i>=0;i--){
    var h=holes[i]; h.t++;
    if(h.t>=TUNE.HOLE_LIFE){
      grid[h.r][h.c]=BRICK; holes.splice(i,1); sfxFill();
      // 穴に居た者は潰される
      for(var e=0;e<enemies.length;e++){
        var en=enemies[e];
        if(!en.dead && en.c===h.c && en.r===h.r && !en.moving){ crushEnemy(en); }
      }
      if(player && !player.dead && player.c===h.c && player.r===h.r && !player.moving){
        killPlayer('穴に 呑まれた…段取り 直しや');
      }
    }
  }
}
function crushEnemy(en){
  score+=200; sfxTrap();
  floaters.push({txt:EKIND[en.kind].name+' を 標準化! +200',x:FX+en.c*T+T/2,y:FY+en.r*T-4,tt:70,col:'#9fe8ff',big:false});
  for(var i=0;i<10;i++) parts.push({x:FX+en.c*T+T/2,y:FY+en.r*T+T/2,vx:(Math.random()-0.5)*4,vy:-Math.random()*3,life:22,max:22,col:EKIND[en.kind].col,sz:2});
  en.dead=TUNE.ENEMY_RESPAWN; en.moving=false; en.trap=0;
}

/* =========================================================================
   敵AI：プレイヤーからの距離マップ（逆向きBFS）を追う
   ========================================================================= */
function nodeSupported(c,r){
  var cur=tileAt(c,r), below=tileAt(c,r+1);
  return cur===HOLE||climbT(cur)||cur===ROPE||solidT(below)||climbT(below);
}
function computeDist(){
  var n=COLS*ROWS;
  dist=new Int16Array(n); for(var i=0;i<n;i++) dist[i]=-1;
  if(!player) return;
  var sc=player.c, sr=player.r;
  if(sc<0||sc>=COLS||sr<0||sr>=ROWS) return;
  var q=[sc+sr*COLS]; dist[sc+sr*COLS]=0;
  var head=0;
  while(head<q.length){
    var id=q[head++], c=id%COLS, r=(id/COLS)|0, d=dist[id];
    // m=(c,r) へ入って来られる n を列挙（＝逆辺）
    var cand=[
      {c:c,   r:r-1, ok:true},                                   // 上から落ちて/降りて来た
      {c:c,   r:r+1, ok:climbT(tileAt(c,r+1))&&climbT(tileAt(c,r))}, // 下からはしごで昇って来た
      {c:c-1, r:r,   ok:nodeSupported(c-1,r)},                   // 右へ歩いて来た
      {c:c+1, r:r,   ok:nodeSupported(c+1,r)}                    // 左へ歩いて来た
    ];
    for(var k=0;k<4;k++){
      var v=cand[k];
      if(!v.ok) continue;
      if(v.c<0||v.c>=COLS||v.r<0||v.r>=ROWS) continue;
      if(!passable(tileAt(v.c,v.r))) continue;
      var nid=v.c+v.r*COLS;
      if(dist[nid]>=0) continue;
      dist[nid]=d+1; q.push(nid);
    }
  }
}
function distAt(c,r){
  if(c<0||c>=COLS||r<0||r>=ROWS) return -1;
  return dist?dist[c+r*COLS]:-1;
}
function enemyThink(e){
  // 現在地から出られる合法手を並べ、距離が最小の方向へ
  var opts=[];
  var cur=tileAt(e.c,e.r);
  if(cur!==HOLE && passable(tileAt(e.c,e.r+1))) opts.push({wx:0,wy:1,d:distAt(e.c,e.r+1)});
  if(climbT(cur)&&climbT(tileAt(e.c,e.r-1))) opts.push({wx:0,wy:-1,d:distAt(e.c,e.r-1)});
  if(nodeSupported(e.c,e.r)){
    if(passable(tileAt(e.c-1,e.r))) opts.push({wx:-1,wy:0,d:distAt(e.c-1,e.r)});
    if(passable(tileAt(e.c+1,e.r))) opts.push({wx:1,wy:0,d:distAt(e.c+1,e.r)});
  }
  var best=null;
  for(var i=0;i<opts.length;i++){
    var o=opts[i]; if(o.d<0) continue;
    if(!best||o.d<best.d) best=o;
  }
  if(best) return best;
  // 見失ったら プレイヤーの居る方へ とりあえず横移動
  var dir=(player.c>e.c)?1:-1;
  return {wx:dir,wy:0,d:0};
}

/* =========================================================================
   更新
   ========================================================================= */
function update(){
  t++;
  for(var i=floaters.length-1;i>=0;i--){ floaters[i].tt--; if(floaters[i].tt<=0) floaters.splice(i,1); }
  for(var i=parts.length-1;i>=0;i--){ var pa=parts[i]; pa.x+=pa.vx; pa.y+=pa.vy; pa.vy+=0.14; pa.life--; if(pa.life<=0) parts.splice(i,1); }
  if(mode!=='play') return;
  updatePlay();
}
function updatePlay(){
  updateHoles();
  // --- 自分 ---
  var wx=0, wy=0;
  var L=pad.left||keyPad.left, R=pad.right||keyPad.right, U=pad.up||keyPad.up, D=pad.down||keyPad.down;
  if(L&&!R) wx=-1; else if(R&&!L) wx=1;
  if(U&&!D) wy=-1; else if(D&&!U) wy=1;
  if(player.digLock>0){ player.digLock--; wx=0; wy=0; }
  // 自分が穴に落ちた時：↑長押しで よじ登る
  if(!player.moving && tileAt(player.c,player.r)===HOLE){
    if(wy<0){
      player.climbHold++;
      if(player.climbHold>=TUNE.CLIMB_OUT && passable(tileAt(player.c,player.r-1))){
        startMove(player,player.c,player.r-1,'climb'); player.climbHold=0;
      }
    } else player.climbHold=0;
  } else player.climbHold=0;
  if(player.moving||player.digLock<=0) actorUpdate(player,wx,wy);
  if(player.anim!==undefined) player.anim=(player.moving?player.anim+1:0);

  // --- 敵 ---
  if(aiTick<=0){ computeDist(); aiTick=TUNE.AI_TICK; } else aiTick--;
  for(var i=0;i<enemies.length;i++){
    var e=enemies[i];
    if(e.dead>0){
      e.dead--;
      if(e.dead===0) respawnEnemy(e);
      continue;
    }
    // 穴にハマっている間は もがく（無害）
    if(!e.moving && tileAt(e.c,e.r)===HOLE){
      e.trap++;
      if(e.trap>=TUNE.ENEMY_ESCAPE && passable(tileAt(e.c,e.r-1))){ startMove(e,e.c,e.r-1,'climb'); e.trap=0; }
      continue;
    }
    if(!e.moving) e.trap=0;
    var mv=enemyThink(e);
    actorUpdate(e,mv.wx,mv.wy);
    e.anim++;
  }
  // --- 接触判定（開始直後は無敵） ---
  if(player.grace>0) player.grace--;
  if(!player.dead && player.grace<=0){
    var px=actorX(player), py=actorY(player);
    for(var i=0;i<enemies.length;i++){
      var e=enemies[i];
      if(e.dead>0||e.trap>0) continue;
      if(Math.abs(actorX(e)-px)<0.6 && Math.abs(actorY(e)-py)<0.6){
        killPlayer(EKIND[e.kind].name+'に 捕まった…'); break;
      }
    }
  }
  // --- 脱出判定 ---
  if(!player.dead && exitOpen && player.r===0){ stageClear(); }   // 最上段に着いた瞬間に脱出成功
}
function respawnEnemy(e){
  var pick=enemyStarts[(Math.random()*enemyStarts.length)|0];
  var tries=0;
  while(tries<8 && Math.abs(pick.c-player.c)+Math.abs(pick.r-player.r)<4){
    pick=enemyStarts[(Math.random()*enemyStarts.length)|0]; tries++;
  }
  e.c=pick.c; e.r=pick.r; e.tc=e.c; e.tr=e.r; e.p=0; e.moving=false; e.trap=0; e.mode='';
}
function killPlayer(msg){
  if(player.dead) return;
  player.dead=1; lives--; sfxDie();
  for(var i=0;i<14;i++) parts.push({x:FX+actorX(player)*T+T/2,y:FY+actorY(player)*T+T/2,vx:(Math.random()-0.5)*4,vy:-Math.random()*3,life:26,max:26,col:'#ffd23f',sz:2});
  if(lives<=0){ gameOver(msg); return; }
  dlg=[{who:'—', line:msg+'\n残り '+lives+'。段取り 組み直して もう一度。'}];
  dlgActive=true; mode='clear'; pendingAction='retry';
}
var pendingAction='';
function stageClear(){
  sfxClear(); score+=500;
  var h=nextHitokoto();
  if(stageNo>=STAGES.length){
    dlg=[{who:h.who,line:h.line}];
    dlgActive=true; mode='clear'; pendingAction='ending';
    return;
  }
  if(stageNo===3){
    // 納期ドラゴンの間を抜けた ＝ どんでん返し
    dlg=[{who:h.who,line:h.line}];
    dlgActive=true; mode='clear'; pendingAction='twist';
    return;
  }
  dlg=[{who:h.who,line:h.line}];
  dlgActive=true; mode='clear'; pendingAction='next';
}
function gameOver(msg){ mode='over'; overMsg=msg; dlg=[]; dlgActive=false; }

/* =========================================================================
   入力（タッチ / マウス / キーボード）
   ========================================================================= */
var BTN_MUTE={x:W-27,y:4,w:24,h:22};
var PAD={
  up   :{x:56, y:432,w:48,h:48,lbl:'▲'},
  left :{x:8,  y:484,w:48,h:48,lbl:'◀'},
  right:{x:104,y:484,w:48,h:48,lbl:'▶'},
  down :{x:56, y:536,w:48,h:48,lbl:'▼'}
};
var DIG_L={x:206,y:470,w:66,h:66,lbl:'⛏左'};
var DIG_R={x:284,y:470,w:66,h:66,lbl:'⛏右'};
function inRect(p,r){ return p.x>=r.x&&p.x<=r.x+r.w&&p.y>=r.y&&p.y<=r.y+r.h; }
function canvasPos(cxp,cyp){
  var r=cv.getBoundingClientRect();
  return { x:(cxp-r.left)*(W/r.width), y:(cyp-r.top)*(H/r.height) };
}
var touchPts={};
function refreshPad(){
  var np={left:false,right:false,up:false,down:false};
  for(var id in touchPts){
    var p=touchPts[id];
    if(inRect(p,PAD.up)) np.up=true;
    if(inRect(p,PAD.down)) np.down=true;
    if(inRect(p,PAD.left)) np.left=true;
    if(inRect(p,PAD.right)) np.right=true;
  }
  pad=np;
}
function handleDown(p){
  initAudio();
  if(inRect(p,BTN_MUTE)){ toggleMute(); return true; }
  if(mode==='title'){ startGame(); return true; }
  if(dlgActive){ advanceDialog(); return true; }
  if(mode==='over'){ mode='title'; return true; }
  if(mode==='win' && dlg.length===0){ mode='title'; return true; }
  if(inRect(p,DIG_L)){ tryDig(-1); return true; }
  if(inRect(p,DIG_R)){ tryDig(1); return true; }
  return false;
}
cv.addEventListener('touchstart',function(ev){
  ev.preventDefault();
  for(var i=0;i<ev.changedTouches.length;i++){
    var tc=ev.changedTouches[i], p=canvasPos(tc.clientX,tc.clientY);
    if(handleDown(p)) continue;
    touchPts[tc.identifier]=p;
  }
  refreshPad();
},{passive:false});
cv.addEventListener('touchmove',function(ev){
  ev.preventDefault();
  for(var i=0;i<ev.changedTouches.length;i++){
    var tc=ev.changedTouches[i];
    if(touchPts[tc.identifier]) touchPts[tc.identifier]=canvasPos(tc.clientX,tc.clientY);
  }
  refreshPad();
},{passive:false});
function endTouch(ev){
  for(var i=0;i<ev.changedTouches.length;i++){ delete touchPts[ev.changedTouches[i].identifier]; }
  refreshPad();
}
window.addEventListener('touchend',endTouch,{passive:false});
window.addEventListener('touchcancel',endTouch,{passive:false});

cv.addEventListener('mousedown',function(ev){
  ev.preventDefault();
  var p=canvasPos(ev.clientX,ev.clientY);
  if(handleDown(p)) return;
  touchPts['m']=p; refreshPad();
});
cv.addEventListener('mousemove',function(ev){
  if(!touchPts['m']) return;
  touchPts['m']=canvasPos(ev.clientX,ev.clientY); refreshPad();
});
window.addEventListener('mouseup',function(){ delete touchPts['m']; refreshPad(); });

/* キーは code（物理キー）優先＝IME/かな入力でも効く。key も併用して取りこぼさない */
function keyRole(ev){
  var c=ev.code||'', k=(ev.key||'').toLowerCase();
  if(c==='ArrowLeft' ||c==='KeyA'||k==='arrowleft' ||k==='a') return 'left';
  if(c==='ArrowRight'||c==='KeyD'||k==='arrowright'||k==='d') return 'right';
  if(c==='ArrowUp'   ||c==='KeyW'||k==='arrowup'   ||k==='w') return 'up';
  if(c==='ArrowDown' ||c==='KeyS'||k==='arrowdown' ||k==='s') return 'down';
  if(c==='KeyZ'||k==='z'||k==='ｚ'||c==='Comma' ||k===','||k==='、') return 'digL';
  if(c==='KeyX'||k==='x'||k==='ｘ'||c==='Period'||k==='.'||k==='。') return 'digR';
  if(c==='Space'||c==='Enter'||c==='NumpadEnter'||k===' '||k==='enter') return 'ok';
  return '';
}
function keyHandler(ev){
  var role=keyRole(ev);
  if(!role) return;
  ev.preventDefault();
  initAudio();
  if(role==='left') keyPad.left=true;
  else if(role==='right') keyPad.right=true;
  else if(role==='up') keyPad.up=true;
  else if(role==='down') keyPad.down=true;
  else if(role==='digL'){ if(dlgActive) advanceDialog(); else tryDig(-1); }
  else if(role==='digR'){ if(dlgActive) advanceDialog(); else tryDig(1); }
  else if(role==='ok'){
    if(mode==='title') startGame();
    else if(dlgActive) advanceDialog();
    else if(mode==='over') mode='title';
    else if(mode==='win'&&dlg.length===0) mode='title';
  }
}
function keyUpHandler(ev){
  var role=keyRole(ev);
  if(role==='left') keyPad.left=false;
  else if(role==='right') keyPad.right=false;
  else if(role==='up') keyPad.up=false;
  else if(role==='down') keyPad.down=false;
}
window.addEventListener('keydown',keyHandler);
window.addEventListener('keyup',keyUpHandler);

function drawBG(){

}
function drawTiles(){

    for(var c=0;c<COLS;c++){
      var v=grid[r][c], x=FX+c*T, y=FY+r*T;
      if(v===BRICK){
        cx.fillStyle='#8a5a3c'; cx.fillRect(x,y,T,T);
        cx.fillStyle='#6b4630'; cx.fillRect(x,y+T-3,T,3); cx.fillRect(x,y+9,T,2);
        cx.fillStyle='#a9714a'; cx.fillRect(x+1,y+1,T-2,3);
        cx.fillStyle='#6b4630'; cx.fillRect(x+9,y,2,9); cx.fillRect(x+4,y+11,2,7);
      } else if(v===SOLID){
        cx.fillStyle='#59626f'; cx.fillRect(x,y,T,T);
        cx.fillStyle='#3f4650'; cx.fillRect(x,y+T-3,T,3);
        cx.fillStyle='#79838f'; cx.fillRect(x+2,y+2,4,4); cx.fillRect(x+T-6,y+2,4,4);
        cx.fillStyle='#79838f'; cx.fillRect(x+2,y+T-8,4,4); cx.fillRect(x+T-6,y+T-8,4,4);
      } else if(v===LADDER||(v===EXIT&&exitOpen)){
        var lc=(v===EXIT)?(((t>>3)%2)?'#9fe8ff':'#5fc8ff'):'#c8d96a';
        cx.fillStyle=lc;
        cx.fillRect(x+2,y,3,T); cx.fillRect(x+T-5,y,3,T);

/* --- 自分（約束戦士・ヘルメット＋作業服） --- */
function drawMe(a){
  var x=FX+actorX(a)*T, y=FY+actorY(a)*T;
  if(a.grace>0 && (t>>2)%2===0) return;   // 無敵中は点滅
  var walk=(a.moving&&a.tr===a.r)?((a.anim>>2)%2):0;
  var climb=(a.moving&&a.tr!==a.r)?((a.anim>>2)%2):0;
  cx.fillStyle='#ffd23f'; cx.fillRect(x+5,y+2,10,5);          // ヘルメット
  cx.fillStyle='#e8c07a'; cx.fillRect(x+6,y+7,8,3);           // 顔

  cx.fillStyle='#2d5a8a';
  if(climb){ cx.fillRect(x+3,y+10,3,4); cx.fillRect(x+14,y+12,3,4); }
  else { cx.fillRect(x+2+(a.face>0?0:0),y+11,3,4); cx.fillRect(x+15,y+11,3,4); }
  cx.fillStyle='#22334a';
  if(walk){ cx.fillRect(x+4,y+16,4,4); cx.fillRect(x+12,y+16,4,3); }
  else { cx.fillRect(x+6,y+16,3,4); cx.fillRect(x+11,y+16,3,4); }
  if(a.digLock>0){ // ツルハシを振る
    cx.fillStyle='#d9d9d9';
    var dx=a.face>0?x+16:x-4;
    cx.fillRect(dx,y+6,6,2); cx.fillRect(a.face>0?dx+4:dx,y+4,2,6);

}
/* --- 敵（経営あるある） --- */
function drawEnemy(e){
  if(e.dead>0) return;
  var x=FX+actorX(e)*T, y=FY+actorY(e)*T;
  var col=EKIND[e.kind].col;
  var sink=e.trap>0?4:0;
  var walk=(e.moving)?((e.anim>>2)%2):0;
  if(e.trap>0 && (t>>2)%2===0) cx.globalAlpha=0.75;
  if(e.kind==='dragon'){
    cx.fillStyle=col; cx.fillRect(x+2,y+4+sink,16,12);
    cx.fillStyle='#ffd23f'; cx.fillRect(x+3,y+1+sink,3,4); cx.fillRect(x+14,y+1+sink,3,4);  // 角
    cx.fillStyle='#2a0d12'; cx.fillRect(x+5,y+7+sink,3,3); cx.fillRect(x+12,y+7+sink,3,3);
    cx.fillStyle='#fff'; cx.fillRect(x+5,y+12+sink,10,2);
  } else if(e.kind==='gonge'){
    cx.fillStyle=col; cx.fillRect(x+2,y+3+sink,16,14);
    cx.fillStyle='#c9a800';                                     // スポンジの穴
    cx.fillRect(x+4,y+5+sink,3,3); cx.fillRect(x+12,y+11+sink,3,3); cx.fillRect(x+8,y+14+sink,2,2);
    cx.fillStyle='#3a2a00'; cx.font='bold 7px sans-serif'; cx.textAlign='center';
    cx.fillText('¥',x+6,y+12+sink); cx.fillText('％',x+14,y+12+sink);
  } else {
    cx.fillStyle=col; cx.fillRect(x+5,y+8+sink,10,8);           // 胴
    cx.fillStyle='#e8c07a'; cx.fillRect(x+6,y+4+sink,8,4);      // 顔
    if(e.kind==='kyaku'){ cx.fillStyle='#fff'; cx.fillRect(x+9,y+9+sink,2,6); cx.fillStyle='#ff2e46'; cx.fillRect(x+9,y+9+sink,2,3); }
    if(e.kind==='gaicyu'){ cx.fillStyle='#4a3b7a'; cx.fillRect(x+4,y+2+sink,12,3); cx.fillRect(x+6,y+0+sink,8,2); }
    if(e.kind==='sagyo'){ cx.fillStyle='#eef3ff'; cx.fillRect(x+14,y+9+sink,3,5); }  // スマホ
    cx.fillStyle='#2b2b38';
    if(walk){ cx.fillRect(x+4,y+16+sink,4,3); cx.fillRect(x+12,y+16+sink,4,3); }
    else { cx.fillRect(x+6,y+16+sink,3,3); cx.fillRect(x+11,y+16+sink,3,3); }
  }
  cx.globalAlpha=1;
}
function drawHUD(){
  cx.textAlign='left'; cx.fillStyle='#dfe8ff'; cx.font='bold 12px sans-serif';
  cx.fillText('生産性 '+score,8,16);
  cx.fillStyle='#ffd23f'; cx.font='bold 12px sans-serif';
  cx.fillText('粗利 '+(goldTotal-goldLeft)+'/'+goldTotal,110,16);
  // 残機（ヘルメット）
  for(var i=0;i<lives;i++){ var lx=8+i*16, ly=26;
    cx.fillStyle='#ffd23f'; cx.fillRect(lx,ly,10,5); cx.fillStyle='#4a86c8'; cx.fillRect(lx+1,ly+5,8,3); }
  cx.textAlign='right'; cx.fillStyle='#9fb0d0'; cx.font='11px sans-serif';
  cx.fillText('STAGE '+stageNo+'/'+STAGES.length,W-36,16);
  cx.fillStyle='#7f8fa8'; cx.font='10px sans-serif';
  cx.fillText(STAGES[stageNo-1]?STAGES[stageNo-1].name:'',W-8,32);

}
function drawMuteBtn(){
  cx.fillStyle='#223'; cx.fillRect(BTN_MUTE.x,BTN_MUTE.y,BTN_MUTE.w,BTN_MUTE.h);
  cx.fillStyle='#9fb0d0'; cx.font='12px sans-serif'; cx.textAlign='center';

}
function drawMsg(){
  cx.textAlign='center'; cx.font='11px sans-serif';
  cx.fillStyle=exitOpen?'#7ad1ff':'#8fa4c8';
  cx.fillText(msgLine,W/2,FY+ROWS*T+18);
}
function btn(b,active){
  cx.fillStyle=active?'#2f4a70':'#1a2334';
  cx.fillRect(b.x,b.y,b.w,b.h);
  cx.strokeStyle=active?'#7ad1ff':'#33415c'; cx.lineWidth=2;
  cx.strokeRect(b.x+1,b.y+1,b.w-2,b.h-2);
  cx.fillStyle=active?'#eaf6ff':'#9fb0d0';
  cx.font='bold '+(b.w>50?14:16)+'px sans-serif'; cx.textAlign='center';
  cx.fillText(b.lbl,b.x+b.w/2,b.y+b.h/2+6);
}
function drawControls(){
  var L=pad.left||keyPad.left, R=pad.right||keyPad.right, U=pad.up||keyPad.up, D=pad.down||keyPad.down;
  btn(PAD.up,U); btn(PAD.left,L); btn(PAD.right,R); btn(PAD.down,D);
  btn(DIG_L,false); btn(DIG_R,false);
  cx.fillStyle='#5a6b86'; cx.font='10px sans-serif'; cx.textAlign='center';
  cx.fillText('走る・のぼる（←→↑↓）',80,600);
  cx.fillText('足元の 床に カイゼン穴',283,556);
  cx.fillText('（穴は そのうち 塞がる）',283,570);
  // PC向けキー表示
  cx.fillStyle='#7ad1ff'; cx.font='bold 10px sans-serif';
  cx.fillText('Z',DIG_L.x+DIG_L.w/2,DIG_L.y+DIG_L.h-8);
  cx.fillText('X',DIG_R.x+DIG_R.w/2,DIG_R.y+DIG_R.h-8);
}
function drawFloaters(){
  cx.textAlign='center';
  for(var i=0;i<floaters.length;i++){ var f=floaters[i];
    cx.globalAlpha=Math.min(1,f.tt/20);
    cx.fillStyle=f.col; cx.font=(f.big?'bold 13px':'bold 10px')+' sans-serif';
    cx.fillText(f.txt,f.x,f.y);
  }
  cx.globalAlpha=1;
}
function drawParts(){
  for(var i=0;i<parts.length;i++){ var pa=parts[i];
    cx.globalAlpha=Math.max(0,pa.life/pa.max); cx.fillStyle=pa.col; cx.fillRect(pa.x,pa.y,pa.sz,pa.sz); }
  cx.globalAlpha=1;
}
function drawDialog(){
  if(!dlgActive||dlg.length===0) return;
  var d=dlg[0];
  var bh=126, by=H-bh-8, bx=10, bw=W-20;
  cx.fillStyle='rgba(6,10,22,.95)'; cx.fillRect(bx,by,bw,bh);
  cx.strokeStyle='#3a5a8a'; cx.lineWidth=2; cx.strokeRect(bx,by,bw,bh);
  cx.textAlign='left';
  cx.fillStyle='#ffd23f'; cx.font='bold 13px sans-serif';
  cx.fillText(d.who,bx+12,by+22);
  cx.fillStyle='#eef3ff'; cx.font='12px sans-serif';
  var lines=d.line.split('\n');
  for(var i=0;i<lines.length;i++) cx.fillText(lines[i],bx+12,by+44+i*17);
  cx.fillStyle='#8fa4c8'; cx.font='10px sans-serif'; cx.textAlign='right';
  cx.fillText('▼ タップで送る',bx+bw-10,by+bh-8);
}
function drawTitle(){

  cx.fillStyle='#e8c07a'; cx.fillRect(bx+231,by+8,8,4);
  cx.fillStyle='#cdd8f0'; cx.font='12px sans-serif';
  cx.fillText('迷宮化した 工場に 落ちた「粗利」を',W/2,278);
  cx.fillText('ぜんぶ 拾って 屋上へ 脱出せよ',W/2,296);
  cx.fillStyle='#8fa4c8'; cx.font='11px sans-serif';
  cx.fillText('・十字ボタンで 走る／はしごを のぼる',W/2,330);
  cx.fillText('・⛏ボタンで 足元の 床に カイゼン穴',W/2,350);
  cx.fillText('・追手を 穴に 落とす（穴は やがて 塞がる）',W/2,370);
  cx.fillText('・鋼材（灰色）は 掘れない／自分が 落ちたら ↑長押し',W/2,390);
  cx.fillText('・大ボス 納期ドラゴン、案内人の 正体は ROIC…',W/2,410);
  cx.fillStyle='#7ad1ff'; cx.font='bold 11px sans-serif';

  cx.fillStyle='#5a7a9a'; cx.font='10px sans-serif';
  cx.fillText('（画面を 一度 クリックしてから キーを 押してください）',W/2,456);
  cx.fillStyle=((t>>4)%2===0)?'#fff':'#5a7'; cx.font='bold 15px sans-serif';
  cx.fillText('TAP TO START',W/2,500);
  cx.fillStyle='#3f4d63'; cx.font='9px sans-serif';

function drawWinEnd(){

  cx.fillStyle='#ffd23f'; cx.font='bold 20px sans-serif';
  cx.fillText('木曜、取り戻した',W/2,H/2-60);

  cx.fillText('粗利は 拾うもんやない、貯まる 仕組みを 作るもんや。',W/2,H/2+58);

  cx.fillText('TAP TO TITLE',W/2,H/2+96);

function render(){
  if(mode==='title'){ drawTitle(); return; }
  drawBG();
  drawTiles();
  drawGold();
  for(var i=0;i<enemies.length;i++) drawEnemy(enemies[i]);
  if(player&&!player.dead) drawMe(player);
  drawParts();
  drawFloaters();
  drawHUD();
  drawMsg();
  drawControls();
  if(mode==='over') drawOver();
  if(mode==='win' && dlg.length===0 && !dlgActive) drawWinEnd();
  drawDialog();
}

/* =========================================================================
   メインループ
   ========================================================================= */
function loop(){ update(); render(); requestAnimationFrame(loop); }
loadStage(1);
requestAnimationFrame(loop);

/* デバッグ用フック（スモークテスト） */
if(typeof module!=='undefined'){
  module.exports={
    STAGES:STAGES, TUNE:TUNE, COLS:COLS, ROWS:ROWS,
    startGame:startGame, loadStage:loadStage, advanceDialog:advanceDialog,
    tryDig:tryDig, update:update, render:render,
    tileAt:tileAt, climbT:climbT, passable:passable, solidT:solidT, nodeSupported:nodeSupported,
    setPad:function(o){ pad={left:!!o.left,right:!!o.right,up:!!o.up,down:!!o.down}; },
    get mode(){return mode;}, set mode(v){mode=v;},
    get player(){return player;}, get enemies(){return enemies;},
    get gold(){return gold;}, get goldLeft(){return goldLeft;}, set goldLeft(v){goldLeft=v;},
    get exitOpen(){return exitOpen;}, get stageNo(){return stageNo;},
    get lives(){return lives;}, get score(){return score;}, get dlg(){return dlg;},
    openExit:openExit
  };
}
