<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>木曜日の迷宮 - OHMAMA SOFT Adventure Series Vol.6</title>
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{
  height:100%;background:#0a0a0e;
  font-family:'DotGothic16','MS Gothic',monospace;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
}
.shell{
  width:min(100vw,680px);
  display:flex;flex-direction:column;
  background:#000;
  border:3px solid #444;
  box-shadow:0 0 40px rgba(80,40,120,.4);
}
.hdr{
  background:#0c0c14;
  border-bottom:2px solid #2a2a3a;
  padding:4px 10px;
  display:flex;justify-content:space-between;align-items:center;
}
.hdr-title{font-size:11px;color:#7a7a9a;letter-spacing:.1em;}
.hdr-vol{font-size:11px;color:#c9a0ff;letter-spacing:.06em;}

.game-area{
  display:grid;
  grid-template-columns:1fr 168px;
  background:#000;
}
.scene-wrap{
  border-right:2px solid #2a2a3a;
  background:#000;
  position:relative;
}
#sceneCanvas{
  display:block;width:100%;
  aspect-ratio:4/3;
  image-rendering:pixelated;image-rendering:crisp-edges;
}
.scene-label{
  position:absolute;bottom:4px;left:6px;
  font-size:10px;color:#aaa;background:rgba(0,0,0,.7);
  padding:1px 5px;letter-spacing:.05em;
}
.cmd-panel{
  background:#000;padding:10px 8px;
  display:flex;flex-direction:column;gap:5px;
}
.cmd-section-label{
  font-size:10px;color:#666;letter-spacing:.1em;
  border-bottom:1px solid #222;padding-bottom:3px;margin-bottom:2px;
}
.cmd-item{
  font-size:clamp(13px,2.2vw,17px);
  color:#cfcfe0;cursor:pointer;
  padding:3px 6px;border-radius:2px;
  display:flex;align-items:center;gap:4px;
  transition:background .1s,color .1s;
  white-space:nowrap;user-select:none;
}
.cmd-item:hover{background:#1c1c28;color:#fff;}
.cmd-item.selected{color:#fff;background:#22182e;}
.cmd-item.selected::before{content:'▶';color:#c9a0ff;font-size:.8em;}
.cmd-item:not(.selected)::before{content:'　';font-size:.8em;}

.status-bar{
  background:#0a0a12;
  border-top:1px solid #222;border-bottom:1px solid #222;
  padding:5px 10px;
  display:flex;gap:14px;align-items:center;
  font-size:11px;color:#777;flex-wrap:wrap;
}
.status-bar span{color:#bbb;}
.gauge{
  flex:1;min-width:90px;height:12px;background:#1a1a24;
  border:1px solid #333;border-radius:6px;overflow:hidden;position:relative;
}
.gauge-fill{
  height:100%;width:100%;
  background:linear-gradient(90deg,#3aa0ff,#8affca);
  transition:width .35s,background .35s;
}
.gauge-fill.mid{background:linear-gradient(90deg,#ffcc44,#ffaa22);}
.gauge-fill.low{background:linear-gradient(90deg,#ff6644,#ff9e9e);}

.text-win{
  background:#0d0d14;min-height:92px;
  padding:8px 12px 6px;border-top:1px solid #222;
}
.text-speaker{font-size:12px;color:#9ad1ff;margin-bottom:3px;letter-spacing:.06em;}
.text-body{font-size:clamp(14px,2.5vw,18px);line-height:1.75;color:#eee;white-space:pre-wrap;}
.text-body.sys{color:#9ad1ff;}
.text-body.npc{color:#fff1a8;}
.text-body.hint{color:#b9ffbf;}
.text-body.ok{color:#8affca;}
.text-body.danger{color:#ff9e9e;}
.text-body.ending{color:#ffe27a;}
.text-body.twist{color:#ff9eea;}
@keyframes _blink{0%,100%{opacity:1}50%{opacity:0}}

.target-panel{
  background:#000;border-top:2px solid #2a2a3a;
  padding:6px 8px;min-height:50px;
  display:flex;flex-wrap:wrap;gap:5px;align-items:flex-start;
}
.target-label{font-size:10px;color:#666;letter-spacing:.08em;width:100%;margin-bottom:2px;}
.tgt-btn{
  background:#12121a;border:1px solid #444;color:#cfcfe0;
  font-family:'DotGothic16','MS Gothic',monospace;
  font-size:clamp(12px,2vw,15px);
  padding:5px 10px;cursor:pointer;transition:all .1s;
  white-space:nowrap;min-height:36px;
}
.tgt-btn:hover{background:#22222e;border-color:#888;color:#fff;}
.tgt-btn:active{transform:scale(.96);}

.line-banner{
  display:none;background:#06c755;color:#fff;
  font-size:12px;padding:8px 12px;text-align:center;border-bottom:2px solid #04a044;
}
.line-banner.show{display:block;}
.line-banner button{
  margin-top:4px;background:#fff;color:#06c755;border:none;
  padding:5px 14px;font-family:inherit;font-size:12px;cursor:pointer;min-height:36px;font-weight:bold;
}
@media(max-width:500px){
  .shell{width:100vw;border:none;}
  html,body{overflow:auto;align-items:flex-start;}
  .cmd-item{font-size:13px;}
}
</style>
</head>
<body>
<div class="shell">
  <div class="line-banner" id="lineBanner">
    ⚠ LINE内ブラウザでは正しく動作しない場合があります
    <br><button onclick="open(location.href)">🌐 ブラウザで開く</button>
  </div>

  <div class="hdr">
    <div class="hdr-title">OHMAMA SOFT · ADVENTURE SERIES</div>
    <div class="hdr-vol" id="hdrVol">Vol.6 木曜日の迷宮</div>
  </div>

  <div class="game-area">
    <div class="scene-wrap">
      <canvas id="sceneCanvas" width="320" height="240"></canvas>
      <div class="scene-label" id="sceneLabel">迷宮入口</div>
    </div>
    <div class="cmd-panel" id="cmdPanel">
      <div class="cmd-section-label" id="cmdLabel">COMMAND</div>
      <!-- commands injected -->
    </div>
  </div>

  <div class="status-bar" id="statusBar">
    <div>ばしょ：<span id="stLoc">迷宮入口</span></div>
    <div style="display:flex;align-items:center;gap:6px;flex:1;">
      <span id="stMetric">生産性</span><div class="gauge"><div class="gauge-fill" id="gaugeFill"></div></div><span id="stProd">100</span>
    </div>
  </div>

  <div class="text-win">
    <div class="text-speaker" id="txSpk">システム</div>
    <div class="text-body sys" id="txBody">…</div>
  </div>

  <div class="target-panel" id="targetPanel">
    <div class="target-label" id="targetLabel">▶ コマンドを えらんでください</div>
  </div>
</div>

<script>
/* ══════════════════════════════════════════════════════════
   ★ ポートピア・エンジン（Portopia Engine）★
   OHMAMA SOFT 製・コマンド選択式アドベンチャーの共通エンジン。
   コマンド→たいしょう の2ステップ操作、迷宮探索、戦闘、どんでん返し、
   エンディングまでを汎用化。ゲーム本体は「編(WORLD)」を差し替えるだけで作れる。
   （命名は名作コマンド選択ADV『ポートピア連続殺人事件』へのリスペクト）

   木曜日の迷宮 — OHMAMA SOFT Adventure Series Vol.6
   ── 中身（データ・セリフ・分岐）はすべて WORLD に集約。エンジンは不変 ──
══════════════════════════════════════════════════════════ */

/* ───────── 週メタ情報（毎週木曜にここを更新）───────── */
let WEEK = {

  {who:'高林君',    line:'「最高や! でも"ムリ・ムラ・ムダ"はまだ残っとる。\n一個ずつ、な?」'},
  {who:'ミヤカワくん',line:'「ナイス! 結局は 人と段取りと、少しの執念や。\n……経営者の悪い癖で、つい一言な」'},

  {who:'佐藤さん',  line:'「ナイス! …夏のボーナス、ちょっと色つけたろか。\n……って、原資の顔して言うてもうた。すまんすまん」'},

  {who:'岩田君',    line:'「ええ仕事や。ダブル台風 来るらしいで、出荷は 前倒しやな。\n……心配性で すまん、でも 段取りは 命や」'},
  {who:'高林君',    line:'「ナイスファイト。青森の地震、みんな 無事やとええな……\n人の無事が 何より。仕事は その あとや」'},

/* ───────── 敵データ ─────────
   weak: 効果ばつぐんになるアプローチ。
   抵抗: 倒すのに必要な「効果ばつぐん」ヒット数。

let ENEMIES = {

    guchi:{who:'高林君', line:'「電気代 上がって 外注さんも しんどい、か。\nこっちも 値上げ お願いしたい 立場やのに……\n"お互いさま"を、ちゃんと 言葉に せなあかんな」'},
    win:'「その条件なら、なんとかやりましょう」\nがいちゅうさんは 道を空けてくれた！',

    guchi:{who:'岩田君', line:'「総会前で あちらも 必死、なんやろな……\nうちも 賞与の原資 にらめっこしとる身や。\n値切られる前に、まず 自分の財布、締めなあかん」'},

    hitOk:'伝わった！ お客様が 耳を傾けはじめる。',
    hitNg:'「言い訳はいい！　とにかく安く！」\nお客様の 圧が さらに強まる……',
  },
  /* 大ボス：別々のアプローチを4種あてる総合力勝負 */

    name:'納期ドラゴン', 抵抗:4, weak:APPROACHES.slice(), needAll:true,
    intro:'迷宮の最奥。壁という壁にカレンダーが燃えている。\n「グォォ……ノウキ……マニアワヌ……」\n大ボス《納期ドラゴン》が 立ちはだかった！',
    win:'納期ドラゴンは 力尽き、燃えるカレンダーが静かに鎮まった。\n屋上への扉が、ひらいた。',

    hitNg:'同じ手は もう効かない！ 別のアプローチが必要だ。\nドラゴンの炎が パーティを焼く！',
  },
  /* 大どんでん返しの最終戦 */

    name:'生産性悪化の権化', 抵抗:3, weak:['標準化','データ分析','カイゼン'], needAll:true,
    intro:'スポンジマンの体が ぐにゃりと膨らみ、黒く濁っていく。\n「……気づかなかったか。ムダ・ムラ・ムリ……\n　すべてを生み続けてきたのは、この私だ」\n《生産性悪化の権化》の正体を あらわした！',

/* ───────── アイテム ───────── */
let ITEMS = {

/* ───────── 迷宮（部屋＝ノード／exitsは方角つき）─────────

  rooms: {

      desc:'目を覚ますと、見慣れたはずの工場が ねじれた迷宮に変わっていた。\nタイムカードの時計は すべて「木？？日」で止まっている。\n木曜日が、迷宮のどこかに 消えてしまったらしい。\n\n窓の外は しとしと——いや ザァザァ 梅雨空。\n壁の貼り紙が じっとり 湿気を吸っている。\n『山下美夢有、海の向こうで 優勝！』『イミニョン 久々のV』\n『ダブル台風 接近、大雨に警戒』『青森で地震、被害に注意』\n『電気代、また上昇』『夏のボーナス、平均は？』——\nジメジメ ざわつく 木曜の朝。それでも、約束は約束だ。',

/* ══════════════════════════════════════════════════════════

  if(state.parDone===0) return 'E';
  const n=state.strokes-state.parDone;
  return n===0?'パー(E)':(n>0?'+'+n:''+n);
}

function cls(c='#000'){ctx.fillStyle=c;ctx.fillRect(0,0,W,H);}
function rect(x,y,w,h,c){ctx.fillStyle=c;ctx.fillRect(x,y,w,h);}
function line(x1,y1,x2,y2,c,lw=1){ctx.strokeStyle=c;ctx.lineWidth=lw;ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();}
function circle(x,y,r,c){ctx.fillStyle=c;ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();}

/* 共通：迷宮の回廊（遠近のある通路）を背景に描く */
function drawCorridor(wall1,wall2,floor){
  cls('#05050a');
  // 床（手前ほど明るい）
  rect(0,150,W,H-150,floor);
  for(let i=0;i<6;i++) line(0,152+i*14,W,152+i*16,'rgba(0,0,0,.25)',1);
  // 天井
  rect(0,0,W,46,'#0a0a14');
  // 奥行きの壁（パース線）
  const cxp=160,cyp=100;
  ctx.strokeStyle='rgba(120,120,160,.25)';ctx.lineWidth=1;
  for(const[x,y]of[[0,0],[W,0],[0,150],[W,150]]){
    ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(cxp,cyp);ctx.stroke();
  }
  // 左右の壁
  rect(0,46,46,104,wall1);
  rect(W-46,46,46,104,wall1);
  for(let i=0;i<4;i++){rect(4,52+i*24,38,18,wall2);rect(W-42,52+i*24,38,18,wall2);}
  // 奥の壁
  rect(110,60,100,80,wall1);
  rect(116,66,88,68,wall2);
}

/* ── 4人の約束戦士 ── */
function golfer(x,y,s,cap,polo,pants,extra){
  s=s||1;const R=n=>Math.round(n*s);
  // 脚
  rect(x-R(7),y+R(34),R(6),R(16),pants);rect(x+R(1),y+R(34),R(6),R(16),pants);
  rect(x-R(8),y+R(48),R(8),R(4),'#fff');rect(x+R(1),y+R(48),R(8),R(4),'#fff'); // ゴルフシューズ
  // 胴（ポロ）
  rect(x-R(9),y+R(16),R(18),R(20),polo);
  rect(x-R(12),y+R(18),R(4),R(13),polo);rect(x+R(8),y+R(18),R(4),R(13),polo);
  rect(x-R(13),y+R(30),R(5),R(5),'#f0d2a8');rect(x+R(8),y+R(30),R(5),R(5),'#f0d2a8');
  rect(x-R(2),y+R(16),R(4),R(8),'#fff'); // 襟あき
  // 頭
  rect(x-R(7),y+R(2),R(14),R(14),'#f0d2a8');
  // 目
  rect(x-R(4),y+R(8),R(3),R(2),'#222');rect(x+R(1),y+R(8),R(3),R(2),'#222');
  // キャップ
  if(cap){rect(x-R(8),y-R(1),R(16),R(5),cap);rect(x-R(8),y+R(3),R(11),R(2),cap);rect(x-R(8),y+R(4),R(15),R(2),cap);}
  if(extra)extra(x,y,R);
}

function drawIwata(x,y,s){golfer(x,y,s,'#2a5acc','#3a78e0','#33332a');}     // 青

/* ══════════════════════════════════════════════════════════
   テキスト表示（タイプライター＋つぎへ）
══════════════════════════════════════════════════════════ */
let _typeTimer=null,_typing=false,_pendingNext=null;
function show(speaker,text,cls,onNext){
  if(_typeTimer){clearInterval(_typeTimer);_typeTimer=null;}
  const spk=document.getElementById('txSpk'),body=document.getElementById('txBody');
  spk.textContent=speaker;
  body.className='text-body '+(cls||'');
  body.textContent='';
  lockCommands(true);
  const cur=document.createElement('span');
  cur.style.cssText='display:inline-block;width:10px;height:1em;background:currentColor;vertical-align:text-bottom;margin-left:2px;animation:_blink .6s step-end infinite;';
  body.appendChild(cur);
  let i=0;_typing=true;_pendingNext=onNext||null;
  _typeTimer=setInterval(()=>{
    if(i<text.length){body.insertBefore(document.createTextNode(text[i]),cur);i++;}
    else{clearInterval(_typeTimer);_typeTimer=null;cur.remove();_typing=false;showNextBtn();}
  },28);
}
function showNextBtn(){
  const panel=document.getElementById('targetPanel');panel.innerHTML='';
  const btn=document.createElement('button');btn.className='tgt-btn';
  btn.style.cssText='border-color:#c9a0ff;color:#c9a0ff;font-size:15px;animation:_blink .8s step-end infinite;';
  btn.textContent='▼ つぎへ';
  btn.onclick=()=>{
    btn.style.animation='none';
    const cb=_pendingNext;_pendingNext=null;lockCommands(false);
    if(cb)cb();else resetPanel();
  };
  panel.appendChild(btn);
}
function lockCommands(lock){
  document.querySelectorAll('.cmd-item').forEach(el=>{
    el.style.pointerEvents=lock?'none':'';el.style.opacity=lock?'0.35':'';
  });
}

function setStatus(){
  const room=SCENARIO.rooms[state.loc];

  document.getElementById('sceneLabel').textContent=room.name;

function hasItem(n){return state.inventory.includes(n);}

/* ══════════════════════════════════════════════════════════
   コマンドパネル（探索／戦闘で切替）
══════════════════════════════════════════════════════════ */
const EXPLORE_CMDS=['みる','すすむ','しらべる','はなす','つかう','もちもの'];
function renderCmdPanel(){
  const panel=document.getElementById('cmdPanel');
  const battleCmds = state.world==='golf' ? ['ショット','つかう','もちもの'] : ['たたかう','つかう','もちもの'];
  const cmds = state.mode==='battle' ? battleCmds : EXPLORE_CMDS;
  document.getElementById('cmdLabel').textContent = state.mode==='battle'?(state.world==='golf'?'SHOT':'BATTLE'):'COMMAND';
  panel.querySelectorAll('.cmd-item').forEach(e=>e.remove());
  cmds.forEach(c=>{
    const d=document.createElement('div');d.className='cmd-item';d.dataset.cmd=c;d.textContent=c;
    d.addEventListener('click',()=>renderTargets(c));
    panel.appendChild(d);
  });
}

let selectedVerb=null;
function getTargets(verb){
  const loc=state.loc, room=SCENARIO.rooms[loc];
  if(verb==='みる') return [{key:'__here__',label:'ここをみる'}];
  if(verb==='もちもの') return [{key:'__inv__',label:'もちものを確認'}];
  if(verb==='すすむ'){
    const ex=room.exits.filter(e=>!e.needClear || cleared(loc));
    if(ex.length===0) return [{key:'__none__',label:'進める道がない'}];
    return ex.map(e=>({key:e.to,label:e.label}));
  }
  if(verb==='しらべる'){
    const list=(room.items||[]).filter(it=>!hasItem(it));
    const base=[{key:'__look__',label:'あたりを調べる'}];
    return base.concat(list.map(it=>({key:'item:'+it,label:it+'を調べる'})));
  }
  if(verb==='はなす') return [{key:'__party__',label:'仲間と話す'}];
  if(verb==='つかう'){
    if(state.inventory.length===0) return [{key:'__none__',label:'もちものがない'}];
    return state.inventory.map(i=>({key:'use:'+i,label:i}));
  }
  if(verb==='たたかう'||verb==='ショット') return APPROACHES.map(a=>({key:'app:'+a,label:a}));
  return [{key:'__none__',label:'－'}];
}
function renderTargets(verb){
  selectedVerb=verb;
  document.querySelectorAll('.cmd-item').forEach(el=>el.classList.toggle('selected',el.dataset.cmd===verb));
  const panel=document.getElementById('targetPanel');panel.innerHTML='';
  const lbl=document.createElement('div');lbl.className='target-label';
  lbl.textContent='▶ 【'+verb+'】 '+((verb==='たたかう'||verb==='ショット')?(state.world==='golf'?'クラブを えらべ':'アプローチを えらべ'):'えらんでください');
  panel.appendChild(lbl);
  getTargets(verb).forEach(t=>{
    if(t.key==='__none__'){const s=document.createElement('span');s.className='target-label';s.style.color='#555';s.textContent=t.label;panel.appendChild(s);return;}
    const b=document.createElement('button');b.className='tgt-btn';b.textContent=t.label;
    b.onclick=()=>exec(verb,t.key,t.label);panel.appendChild(b);
  });
}
function resetPanel(){
  selectedVerb=null;
  document.querySelectorAll('.cmd-item').forEach(el=>el.classList.remove('selected'));
  document.getElementById('targetPanel').innerHTML='<div class="target-label">▶ コマンドを えらんでください</div>';
}

function exec(verb,key,label){
  if(key==='__none__')return;
  if(key==='__here__'||key==='__look__') return doLook(key==='__look__');
  if(key==='__inv__') return doInventory();
  if(key==='__party__') return doTalk();
  if(verb==='すすむ') return doMove(key);
  if(key.startsWith('item:')) return doTakeItem(key.slice(5));
  if(key.startsWith('use:')) return doUse(key.slice(4));
  if(key.startsWith('app:')) return doApproach(key.slice(4));
}

/* ══════════════════════════════════════════════════════════
   探索コマンド
══════════════════════════════════════════════════════════ */
function doLook(detail){

}
function doInventory(){

function doTalk(){

    press:'高林君「敵が出ても慌てるな。"経営的アプローチ"で対処だ」',
    storage:'岩田君「倉庫は宝の山だ。しらべて損はない」',
    assembly:'佐藤さん「発注書が流れてくる…外注がらみだな」',
    meeting:'高林君「ボードに"ボトルネックは最奥"。階段の先か」\n岩田君「…そういえば テクノの インド研修、決まったらしいで」\n佐藤さん「ええ話や。若いのが 海外で 揉まれるのは 一生の財産になる」\n高林君「山下美夢有も 海の向こうで 優勝や。送り出す側の 覚悟やな」\nミヤカワくん「…せやな。木曜 取り戻して、賞与も研修も 胸 張って渡そ」',
    inspect:'ミヤカワくん「ゲートの向こうにお客様の影。逃げられんぞ」',
    stairs:'岩田君「熱い…!　ここが最奥だ。全員、気合入れろ!」',
  };
  show('仲間たち', lines[state.loc] || PARTY[0]+'「木曜の練習会で会おう」', 'npc', ()=>resetPanel());

function doTakeItem(it){
  getItem(it);
  show('システム','「'+it+'」を手に入れた！\n'+ITEMS[it].desc,'ok',()=>{setStatus();resetPanel();});
}
function doUse(it){
  if(state.world==='golf'){
    if(it==='スポーツドリンク'){
      state.inventory=state.inventory.filter(x=>x!==it);
      state.golfShield=true;
      return show('システム','スポーツドリンクを 飲んだ!\n集中が 戻った。次の1打の ミスを 1回 帳消しにする。','ok',()=>{setStatus();resetPanel();});
    }
    if(it==='優勝記念ボール')
      return show(PARTY[2],'「やらまい会 40-43の 球や。…落ち着いて いこ」\n少し 心が 静まった。','ok',()=>resetPanel());
    return show('システム','『'+it+'』は ショットの ときに 自動で 力を 発揮する。','hint',()=>resetPanel());
  }
  if(it==='エナジードリンク'){
    state.inventory=state.inventory.filter(x=>x!==it);
    state.prod=Math.min(100,state.prod+30);
    return show('システム','エナジードリンクを飲んだ！\n生産性が30回復した。','ok',()=>{setStatus();resetPanel();});
  }
  if(it==='ゴルフクラブ')
    return show(PARTY[0],'「木曜の約束、まだ果たしてない。…行くぞ」\n少し勇気がわいた。','ok',()=>resetPanel());
  show('システム','今は使いどころがないようだ。\n（'+it+'は戦闘で自動的に効果を発揮する）','hint',()=>resetPanel());
}

function doMove(to){
  const room=SCENARIO.rooms[state.loc];
  const exit=room.exits.find(e=>e.to===to);
  if(exit && exit.needClear && !cleared(state.loc))
    return show('システム','まだ先へは進めない。ここを片付けるのが先だ。','danger',()=>resetPanel());
  state.loc=to;
  const nr=SCENARIO.rooms[to];
  drawExplore();setStatus();
  show('システム','【移動】'+nr.name,'sys',()=>{
    if(nr.ending) return triggerEnding();
    show(nr.name, nr.desc, '', ()=>{
      // 初回イベント（案内人スポンジマン登場）
      if(nr.first==='guide' && !state.flags.guideMet){ resetPanel(); return; }
      // 部屋の敵
      if(nr.enemy && !cleared(to)) return startBattle(nr.enemy);
      resetPanel();
    });
  });
}

/* ══════════════════════════════════════════════════════════
   戦闘
══════════════════════════════════════════════════════════ */
function startBattle(enemyKey){
  const e=ENEMIES[enemyKey];
  state.mode='battle';
  state.battle={key:enemyKey, 残:e.抵抗, used:[]};
  renderCmdPanel();
  drawBattleScene();
  show(e.name, e.intro, 'danger', ()=>{
    // 経営者の愚痴（あるある）→ そのあと戦闘へ
    if(e.guchi) return show('経営者の愚痴・'+e.guchi.who, e.guchi.line, 'npc', ()=>{ resetPanel(); promptApproach(); });
    resetPanel(); promptApproach();
  });
}
function promptApproach(){
  // 自動でたたかう/ショットを開いて選択へ誘導
  renderTargets(state.world==='golf'?'ショット':'たたかう');
}
function doApproach(app){
  if(state.world==='golf') return golfShot(app);
  const b=state.battle, e=ENEMIES[b.key];
  // アイテムによる確定効果
  const boostKaizen = hasItem('カイゼン提案書') && app==='カイゼン';
  const boost5S     = hasItem('5Sチェックシート') && app==='標準化';
  let effective = e.weak.includes(app) || boostKaizen || boost5S;
  // needAll（ボス・権化）は同じアプローチの再使用を無効化
  if(effective && e.needAll && b.used.includes(app)) effective=false;

  if(effective){
    b.残--; b.used.push(app);
    const extra=(boostKaizen||boost5S)?'\n（アイテムの効果で必中！）':'';
    if(b.残<=0){
      drawBattleScene();
      return show(e.name, e.hitOk+extra+'\n\n'+e.win, 'ok', ()=>winBattle());
    }
    const need = e.needAll ? '別のアプローチで畳みかけろ！（残り'+b.残+'）' : 'もう一押し！（残り'+b.残+'）';
    show('効果ばつぐん！', e.hitOk+extra+'\n'+need, 'ok', ()=>{ resetPanel(); promptApproach(); });
  } else {
    const dmg = e.key==='boss'||b.key==='boss'||b.key==='kenge' ? 20 : 15;
    state.prod=Math.max(0,state.prod-dmg); setStatus();
    if(state.prod<=0){
      return show('システム', e.hitNg+'\n\n生産性がゼロになった……\nパーティは いったん 撤退した。', 'danger', ()=>gameOver());
    }
    show('いまひとつ…', e.hitNg+'\n生産性が'+dmg+'下がった。（残り'+state.prod+'）', 'danger', ()=>{ resetPanel(); promptApproach(); });
  }
}
/* ⛳ ゴルフ：1ショット＝クラブ選択。正しいクラブで前進、ミスは打数ロス（池はペナルティ） */
function golfShot(app){
  const b=state.battle, e=ENEMIES[b.key];
  const isKenge = b.key==='kenge';   // 権化戦＝メンタル戦（打数に数えない）
  const boostDrv = hasItem('本気のKsドライバー')  && app==='ドライバー' && e.weak.includes('ドライバー');
  const boostPtr = hasItem('ゼロトルクパター') && app==='パター'     && e.weak.includes('パター');
  let good = e.weak.includes(app) || boostDrv || boostPtr;
  if(good && e.needAll && b.used.includes(app)) good=false;

  if(!isKenge) state.strokes++;       // 1打 消費
  if(good){
    b.残--; b.used.push(app);
    const extra=(boostDrv||boostPtr)?'\n（マイクラブで ばっちり!）':'';
    if(b.残<=0){ drawBattleScene(); setStatus();
      return show(e.name, e.hitOk+extra+'\n\n'+e.win, 'ok', ()=>winBattle()); }
    setStatus();
    const need = e.needAll ? '別のクラブで 畳みかけろ!（残り'+b.残+'）' : 'もう一押し!（残り'+b.残+'）';
    return show('ナイスショット!', e.hitOk+extra+'\n'+need, 'ok', ()=>{ resetPanel(); promptApproach(); });
  }
  // ミス
  let pen='';
  if(!isKenge){
    if(state.golfShield){ state.golfShield=false; state.strokes--; pen='\n（スポーツドリンクで ミスを 帳消し!）'; }
    else if(b.key==='fairway'){ state.strokes++; pen='\n池ポチャ! ペナルティ 1打。'; }
  }
  setStatus();
  show('いまひとつ…', e.hitNg+pen, 'danger', ()=>{ resetPanel(); promptApproach(); });
}

function winBattle(){
  const b=state.battle, key=b.key, e=ENEMIES[key];
  state.flags['cleared_'+state.loc]=true;
  if(WORLD.onWin) WORLD.onWin(e);              // 編ごとのスコア更新（生産性+10／パー加算）
  state.mode='explore'; state.battle=null;
  renderCmdPanel(); drawExplore(); setStatus();
  // 分岐：①権化（最終戦）→エンディング ②ボス部屋→どんでん返し ③通常→ひとこと
  if(key==='kenge'){
    state.loc=WORLD.ending.room;
    return show('システム', WORLD.kengeCleared(), 'ok', ()=>triggerEnding());
  }
  if(SCENARIO.rooms[state.loc].boss){
    return show('システム', WORLD.bossCleared(), 'ok', ()=>runTwist());
  }
  show('システム', WORLD.battleWon(), 'ok', ()=>ownerHitokoto(()=>resetPanel()));
}

/* どんでん返し：案内人 → 正体（権化）戦。演出は WORLD.twist に定義 */
function runTwist(){
  const t=WORLD.twist;
  drawRoomBG(t.bg||state.loc); drawParty(); t.sprite(160,72); frame();
  (function step(i){
    if(i>=t.lines.length){ state.mode='battle'; return startBattle(t.nextBattle); }
    const ln=t.lines[i];
    show(ln.speaker, ln.body, ln.cls||'npc', ()=>step(i+1));
  })(0);
}

/* 経営者は、ねぎらいつつ結局ひとこと添えてしまう（勝利のたびにローテーション） */
function ownerHitokoto(next){
  const h=OWNER_HITOKOTO[state.hitokotoIdx % OWNER_HITOKOTO.length];
  state.hitokotoIdx++;
  show('経営者のひとこと・'+h.who, h.line, 'npc', next||(()=>resetPanel()));
}
function gameOver(){
  document.querySelectorAll('.cmd-item').forEach(el=>el.style.pointerEvents='none');
  const panel=document.getElementById('targetPanel');panel.innerHTML='';
  const b=document.createElement('button');b.className='tgt-btn';
  b.style.cssText='border-color:#ff9e9e;color:#ff9e9e;';
  b.textContent='↺ もう一度 挑戦する';
  b.onclick=()=>location.reload();
  panel.appendChild(b);
}

/* ══════════════════════════════════════════════════════════
   エンディング（演出は WORLD.ending に定義）
══════════════════════════════════════════════════════════ */
function triggerEnding(){
  if(state.ended) return;
  state.ended=true;
  const en=WORLD.ending;
  drawRoomBG(en.bg); drawParty(); frame();
  document.getElementById('sceneLabel').textContent=en.label;
  document.querySelectorAll('.cmd-item').forEach(el=>el.style.pointerEvents='none');
  show(en.title, en.body(), 'ending', ()=>{
    document.getElementById('targetPanel').innerHTML='<div class="target-label">'+en.footer+'</div>';
  });
}

  document.getElementById('sceneLabel').textContent='タイトル';
  const spk=document.getElementById('txSpk'), body=document.getElementById('txBody');
  spk.textContent='OHMAMA SOFT'; body.className='text-body sys';
  body.textContent='いらっしゃい。今夜は どちらで 遊びますか?\n\n🏭 工場編 … 迷宮化した工場を 脱出せよ\n⛳ ゴルフ編 … 約束の1番ホールを 攻略せよ';
  const panel=document.getElementById('targetPanel');
  panel.innerHTML='<div class="target-label">▶ シリーズを えらんでください</div>';
  WORLD_MENU.forEach(m=>{
    const btn=document.createElement('button');btn.className='tgt-btn';btn.textContent=m.label;
    btn.onclick=()=>startWorld(m.key);panel.appendChild(btn);
  });
}
/* 選んだ編で 状態を初期化して開始 */
function startWorld(key){
  applyWorld(key);
  Object.assign(state,{loc:SCENARIO.start,prod:100,inventory:[],flags:{},mode:'explore',
    battle:null,ended:false,hitokotoIdx:0,strokes:0,parDone:0,golfShield:false});
  document.getElementById('hdrVol').textContent=(key==='factory'?'Vol.6 ':'')+WEEK.title+'　第'+WEEK.no+'夜';
  renderCmdPanel(); drawExplore(); setStatus();
  runIntro();
}
/* 導入 → 案内人（初回イベント）。演出は WORLD.intro / WORLD.guide に定義 */
function runIntro(){
  const w=WORLD;
  show(w.intro.speaker, w.intro.body(), 'sys', ()=>{
    drawRoomBG(SCENARIO.start); drawParty();
    if(w.guide){
      w.guide.sprite(w.guide.x,70); frame();
      return show(w.guide.speaker, w.guide.body, 'npc', ()=>{ state.flags.guideMet=true; resetPanel(); });
    }
    frame(); state.flags.guideMet=true; resetPanel();
  });
}
init();
</script>
